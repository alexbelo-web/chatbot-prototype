<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkiBot - Ski Conditions Advisor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; height: 100vh; }
    header { background: #16213e; padding: 16px 24px; text-align: center; }
    header h1 { color: #4fc3f7; font-size: 1.4rem; }
    header p { color: #aaa; font-size: 0.85rem; margin-top: 4px; }
    #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
    .user { background: #0077b6; align-self: flex-end; border-bottom-right-radius: 2px; }
    .bot { background: #16213e; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #2a2a4a; }
    .typing { color: #aaa; font-style: italic; background: #16213e; align-self: flex-start; border: 1px solid #2a2a4a; }
    #input-area { display: flex; padding: 16px; gap: 10px; background: #16213e; border-top: 1px solid #2a2a4a; }
    #user-input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid #2a2a4a; background: #0f3460; color: #eee; font-size: 0.95rem; outline: none; }
    #send-btn { padding: 12px 24px; background: #4fc3f7; color: #000; border: none; border-radius: 24px; cursor: pointer; font-weight: bold; }
    #send-btn:hover { background: #81d4fa; }
  </style>
</head>
<body>
  <header>
    <h1>⛷️ SkiBot</h1>
    <p>Your personal ski conditions advisor</p>
  </header>
  <div id="chat-box">
    <div class="message bot">Hey! I'm SkiBot 🎿 Ask me anything about ski conditions, trail difficulty, gear, or safety tips. Where are you planning to ski?</div>
  </div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Ask about ski conditions..." />
    <button id="send-btn">Send</button>
  </div>
  <script>
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const conversationHistory = [];

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message');
      msg.classList.add(sender);
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msg;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      conversationHistory.push({ role: 'user', text });
      input.value = '';
      const typing = addMessage('SkiBot is thinking...', 'typing');
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ history: conversationHistory })
        });
        const data = await res.json();
        typing.remove();
        addMessage(data.reply, 'bot');
        conversationHistory.push({ role: 'bot', text: data.reply });
      } catch {
        typing.remove();
        addMessage('Sorry, something went wrong. Try again!', 'bot');
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
